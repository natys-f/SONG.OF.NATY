<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONGS OF NATY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">🎵SONGS OF NATY🎧</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="container bg-dark p-3 my-3 border border-secondary rounded-4">

        <section id="banner" class="mb-5">
            <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner rounded-3">
                    <div class="carousel-item active">
                        <img src="https://i.ytimg.com/vi/PdFEoogzrWI/maxresdefault.jpg"
                            class="d-block w-100" alt="Slide 1">
                    </div>
                    <div class="carousel-item">
                        <img src="https://i.ytimg.com/vi/sabW3up4BY8/maxresdefault.jpg"
                            class="d-block w-100" alt="Slide 2">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </section>

        <section id="musicas-quadradas" class="px-2">
            <h4 class="mb-3">Tocadas recentemente</h4>

            <div id="spotifyCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner bg-secondary bg-opacity-10 p-4 rounded-4">

                    <div class="carousel-item active">
                        <div class="row justify-content-center g-3">

                            <div class="col-6 col-md-4 col-lg-3">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://akamai.sscdn.co/uploadfile/letras/albuns/b/2/b/6/666421538735962.jpg"
                                            class="card-img-top rounded-3 object-fit-cover" alt="Birds of a Feather">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">Cidade Vizinha</h6>
                                        <p class="card-text small text-secondary text-truncate">Henrique e Juliano</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-6 col-md-4 col-lg-3">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://i.ytimg.com/vi/bOhasdCq1OU/maxresdefault.jpg"
                                            class="card-img-top rounded-3 object-fit-cover" alt="Good Luck, Babe!">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">Deixa Alagar</h6>
                                        <p class="card-text small text-secondary text-truncate">Grupo Revelação</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-6 col-md-4 col-lg-3 d-none d-md-block">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://m.media-amazon.com/images/I/91NyOt4aTKL._UXNaN_FMjpg_QL85_.jpg"
                                            class="card-img-top rounded-3 object-fit-cover" alt="Obsessed">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">PQ VC NÃO ME LIGA?</h6>
                                        <p class="card-text small text-secondary text-truncate">Nanda Tsunami</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="carousel-item">
                        <div class="row justify-content-center g-3">

                            <div class="col-6 col-md-4 col-lg-3">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://cdn-images.dzcdn.net/images/cover/f0282817b697279e56df13909962a54a/1900x1900-000000-80-0-0.jpg"
                                            class="card-img-top rounded-3 object-fit-cover" alt="Die With A Smile">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">Come As You Are</h6>
                                        <p class="card-text small text-secondary text-truncate">Nirvana
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-6 col-md-4 col-lg-3">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://i.scdn.co/image/ab67616d0000b27344d94ab14132664e55436af5"
                                            class="card-img-top rounded-3 object-fit-cover" alt="APT.">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">Tu Mandas No Meu Coração</h6>
                                        <p class="card-text small text-secondary text-truncate">Os Travessos</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-6 col-md-4 col-lg-3 d-none d-md-block">
                                <div class="card bg-transparent border-0 text-white h-100">
                                    <div class="ratio ratio-1x1">
                                        <img src="https://i.scdn.co/image/ab67616d0000b27325b055377757b3cdd6f26b78"
                                            class="card-img-top rounded-3 object-fit-cover" alt="Not Like Us">
                                    </div>
                                    <div class="card-body px-0 pt-2">
                                        <h6 class="card-title text-truncate mb-1">All Falls Down</h6>
                                        <p class="card-text small text-secondary text-truncate">Kanye West</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#spotifyCarousel"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#spotifyCarousel"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Próximo</span>
                </button>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
